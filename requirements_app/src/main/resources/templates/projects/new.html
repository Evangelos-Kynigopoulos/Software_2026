<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>New Project</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .project-card {
            background: white;
            width: 460px;
            padding: 35px;
            border-radius: 14px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.12);
        }

        h1 {
            margin-top: 0;
            margin-bottom: 8px;
            color: #1f2937;
            text-align: center;
        }

        .subtitle {
            text-align: center;
            color: #6b7280;
            margin-bottom: 28px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            color: #374151;
            font-weight: bold;
        }

        input,
        textarea {
            width: 100%;
            box-sizing: border-box;
            padding: 11px;
            margin-bottom: 18px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 14px;
            font-family: Arial, sans-serif;
        }

        textarea {
            min-height: 110px;
            resize: vertical;
        }

        input:focus,
        textarea:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.15);
        }

        button,
        .button {
            width: 100%;
            box-sizing: border-box;
            background: #2563eb;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            display: block;
            text-align: center;
        }

        button:hover,
        .button:hover {
            background: #1d4ed8;
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
            color: #6b7280;
        }

        .back-link a {
            color: #2563eb;
            text-decoration: none;
            font-weight: bold;
        }

        .back-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

<div class="project-card">
    <h1>Create Project</h1>
    <p class="subtitle">Start a new requirements analysis project</p>

    <form th:action="@{/projects}" th:object="${project}" method="post">
        <div>
            <label>Name</label>
            <input type="text" th:field="*{name}" placeholder="Example: Library Management System" required>
        </div>

        <div>
            <label>Description</label>
            <textarea th:field="*{description}" placeholder="Briefly describe the project..." required></textarea>
        </div>

        <button type="submit">Save Project</button>
    </form>

    <p class="back-link">
        <a th:href="@{/projects}">Back to Projects</a>
    </p>
</div>

</body>
</html>
