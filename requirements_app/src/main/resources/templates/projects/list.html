<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>My Projects</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            margin: 0;
            min-height: 100vh;
            padding: 40px;
            box-sizing: border-box;
        }

        .page-card {
            background: white;
            max-width: 1000px;
            margin: 0 auto;
            padding: 35px;
            border-radius: 14px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.12);
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
            gap: 16px;
        }

        h1 {
            margin: 0;
            color: #1f2937;
        }

        .subtitle {
            color: #6b7280;
            margin-top: 8px;
            margin-bottom: 0;
        }

        .button {
            background: #2563eb;
            color: white;
            border: none;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            white-space: nowrap;
        }

        .button:hover {
            background: #1d4ed8;
        }

        .edit-button {
            background: #16a34a;
        }

        .edit-button:hover {
            background: #15803d;
        }

        .delete-button {
            background: #dc2626;
        }

        .delete-button:hover {
            background: #b91c1c;
        }

        .logout-button {
            background: #6b7280;
        }

        .logout-button:hover {
            background: #4b5563;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 24px;
        }

        th {
            background: #f9fafb;
            color: #374151;
            text-align: left;
            padding: 13px;
            border-bottom: 1px solid #d1d5db;
        }

        td {
            padding: 13px;
            border-bottom: 1px solid #e5e7eb;
            color: #374151;
            vertical-align: middle;
        }

        tr:hover {
            background: #f9fafb;
        }

        .actions {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .empty-message {
            margin-top: 28px;
            padding: 18px;
            background: #f9fafb;
            border-radius: 10px;
            color: #6b7280;
            text-align: center;
        }

        form {
            margin: 0;
        }
    </style>
</head>

<body>

<div class="page-card">

    <div class="top-bar">
        <div>
            <h1>My Projects</h1>
            <p class="subtitle">Manage your requirements analysis projects</p>
        </div>

        <div class="actions">
            <a class="button" th:href="@{/projects/new}">Create New Project</a>

            <form th:action="@{/logout}" method="post">
                <button class="button logout-button" type="submit">Logout</button>
            </form>
        </div>
    </div>

    <div th:if="${#lists.isEmpty(projects)}" class="empty-message">
        You do not have any projects yet. Create your first project to get started.
    </div>

    <table th:if="${!#lists.isEmpty(projects)}">
        <thead>
        <tr>
            <th>Name</th>
            <th>Description</th>
            <th style="width: 180px;">Actions</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="project : ${projects}">
            <td th:text="${project.name}">Project name</td>
            <td th:text="${project.description}">Project description</td>
            <td>
                <div class="actions">
                    <a class="button edit-button"
                       th:href="@{/projects/{id}/edit(id=${project.id})}">
                        Edit
                    </a>

                    <form th:action="@{/projects/{id}/delete(id=${project.id})}" method="post">
                        <button class="button delete-button" type="submit">
                            Delete
                        </button>
                    </form>
                </div>
            </td>
        </tr>
        </tbody>
    </table>

</div>

</body>
</html>
