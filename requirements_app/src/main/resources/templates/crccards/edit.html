<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit CRC Card</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            margin: 0;
            min-height: 100vh;
            padding: 40px;
            box-sizing: border-box;
        }

        .page-card {
            background: white;
            max-width: 750px;
            margin: 0 auto;
            padding: 35px;
            border-radius: 14px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.12);
        }

        h1 {
            margin: 0;
            color: #1f2937;
        }

        .subtitle {
            color: #6b7280;
            margin-top: 8px;
            margin-bottom: 28px;
        }

        label {
            display: block;
            font-weight: bold;
            color: #374151;
            margin-bottom: 8px;
            margin-top: 18px;
        }

        input,
        textarea {
            width: 100%;
            padding: 11px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 15px;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        textarea {
            min-height: 120px;
            resize: vertical;
        }

        input:focus,
        textarea:focus {
            outline: none;
            border-color: #2563eb;
        }

        .checkbox-section {
            margin-top: 18px;
        }

        .checkbox-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
            margin-top: 10px;
        }

        .checkbox-card {
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px solid #d1d5db;
            border-radius: 10px;
            padding: 12px;
            background: #f9fafb;
            cursor: pointer;
            transition: 0.2s;
        }

        .checkbox-card:hover {
            background: #eef2ff;
            border-color: #2563eb;
        }

        .checkbox-card input {
            width: auto;
            cursor: pointer;
        }

        .checkbox-title {
            font-weight: bold;
            color: #1f2937;
        }

        .empty-message {
            padding: 14px;
            background: #f9fafb;
            border-radius: 10px;
            color: #6b7280;
            border: 1px solid #e5e7eb;
        }

        .actions {
            margin-top: 26px;
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .button {
            background: #2563eb;
            color: white;
            border: none;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            white-space: nowrap;
        }

        .button:hover {
            background: #1d4ed8;
        }

        .green-button {
            background: #16a34a;
        }

        .green-button:hover {
            background: #15803d;
        }

        .secondary-button {
            background: #6b7280;
        }

        .secondary-button:hover {
            background: #4b5563;
        }
    </style>
</head>

<body>

<div class="page-card">

    <h1>Edit CRC Card</h1>
    <p class="subtitle">Update this CRC card definition and linked use cases</p>

    <form th:action="@{/projects/{projectId}/crc-cards/{crcCardId}/edit(projectId=${projectId}, crcCardId=${crcCard.id})}"
          th:object="${crcCard}"
          method="post">

        <label for="className">Class Name</label>
        <input id="className"
               type="text"
               th:field="*{className}"
               required>

        <label for="responsibilities">Responsibilities</label>
        <textarea id="responsibilities"
                  th:field="*{responsibilities}"></textarea>

        <label for="collaborations">Collaborations</label>
        <textarea id="collaborations"
                  th:field="*{collaborations}"></textarea>

        <div class="checkbox-section">
            <label>Linked Use Cases</label>

            <div th:if="${#lists.isEmpty(useCases)}" class="empty-message">
                No use cases have been created for this project yet.
            </div>

            <div th:if="${!#lists.isEmpty(useCases)}" class="checkbox-grid">
                <label class="checkbox-card" th:each="useCase : ${useCases}">
                    <input type="checkbox"
                           name="useCaseIds"
                           th:value="${useCase.id}"
                           th:checked="${#lists.contains(selectedUseCaseIds, useCase.id)}">

                    <span class="checkbox-title"
                          th:text="${useCase.title}">
                        Use Case Title
                    </span>
                </label>
            </div>
        </div>

        <div class="actions">
            <button class="button green-button" type="submit">
                Save Changes
            </button>

            <a class="button secondary-button"
               th:href="@{/projects/{projectId}/crc-cards(projectId=${projectId})}">
                Back to CRC Cards
            </a>
        </div>

    </form>

</div>

</body>
</html>
